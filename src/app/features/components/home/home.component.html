<div class="home-container">

  <!-- ══════════════════════════════════
       HERO BANNER
  ══════════════════════════════════ -->
  <div class="hero-banner">
    <div class="hero-left">
      <div class="hero-greeting">{{ greeting }},</div>
      <div class="hero-username">{{ userName || 'Welcome Back' }}</div>
      <div class="hero-sub">
        <i class="fa-solid fa-building-shield me-1"></i>
        Biometric Attendance System — Smart Office
      </div>
    </div>
    <div class="hero-right">
      <div class="clock-box">
        <div class="clock-time">{{ currentTime }}</div>
        <div class="clock-date">{{ currentDate }}</div>
      </div>
    </div>
  </div>

  <!-- ══════════════════════════════════
       ROW 1 — 3 STAT CARDS
  ══════════════════════════════════ -->
  <div class="stat-row-3">
    <a class="stat-card"
       *ngFor="let s of row1"
       [routerLink]="s.route"
       [class]="'stat-card card-' + s.color">
      <div class="sc-top-bar" [class]="'bar-' + s.color"></div>
      <div class="sc-body">
        <div class="sc-icon" [class]="'icon-' + s.color">
          <i [class]="s.icon"></i>
        </div>
        <div class="sc-info">
          <div class="sc-value">
            <ng-container *ngIf="!loading; else skelTpl">{{ s.value | number }}</ng-container>
            <ng-template #skelTpl><span class="skel"></span></ng-template>
          </div>
          <div class="sc-label">{{ s.label }}</div>
          <div class="sc-desc">{{ s.desc }}</div>
        </div>
        <div class="sc-arrow"><i class="fa-solid fa-arrow-right"></i></div>
      </div>
    </a>
  </div>

  <!-- ══════════════════════════════════
       ROW 2 — 2 STAT CARDS + DONUT CHART
  ══════════════════════════════════ -->

            </div>
            <div class="sc-label">{{ s.label }}</div>
            <div class="sc-desc">{{ s.desc }}</div>
          </div>
          <div class="sc-arrow"><i class="fa-solid fa-arrow-right"></i></div>
        </div>
      </a>
    </div>
